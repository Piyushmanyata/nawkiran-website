<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 160" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&amp;display=swap');
      .logo-text {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-weight: 800;
        font-size: 28px;
        letter-spacing: -0.03em;
        text-anchor: middle;
      }
    </style>
  </defs>
  <!-- Dark Navy Background -->
  <rect width="100%" height="100%" fill="#0b1b3c" rx="8" />
  
  <!-- SunMark Sunrise Arcs -->
  <g transform="translate(100, 15)">
    <path d="M 37 50 A 13 13 0 0 1 63 50" stroke="#e23b2e" stroke-width="4.6" stroke-linecap="round" fill="none" />
    <path d="M 29 50 A 21 21 0 0 1 71 50" stroke="#f15a2b" stroke-width="4.6" stroke-linecap="round" fill="none" />
    <path d="M 21 50 A 29 29 0 0 1 79 50" stroke="#f7861f" stroke-width="4.6" stroke-linecap="round" fill="none" />
    <path d="M 13 50 A 37 37 0 0 1 87 50" stroke="#f9a826" stroke-width="4.6" stroke-linecap="round" fill="none" />
    <path d="M 5 50 A 45 45 0 0 1 95 50" stroke="#fbc01f" stroke-width="4.6" stroke-linecap="round" fill="none" />
  </g>
  <!-- Two-tone Wordmark (Light) -->
  <text x="150" y="130" class="logo-text">
    <tspan fill="#ffffff">NAW</tspan><tspan fill="#e8531a">KIRAN</tspan>
  </text>
</svg>
